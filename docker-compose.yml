services:
  isabelle-gym:
    platform: linux/amd64
    build:
      context: .
      # If you use buildx, you can also specify:
      # args:
      #   - TARGETARCH=amd64
    container_name: isabelle-gym
    volumes:
      - .:/app
      - isabelle_user_data:/root/.isabelle
    environment:
      - ISABELLE_HOME=/opt/isabelle
      - PYTHONPATH=/app
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"
    command: bash

volumes:
  isabelle_user_data: