services:
  isabelle-gym:
    platform: linux/amd64
    build:
      context: .
    container_name: isabelle-gym
    volumes:
      - .:/app
      - ./logs:/app/logs                    # ADD HERE (under volumes in services)
      - isabelle_user_data:/root/.isabelle
    environment:
      - ISABELLE_HOME=/opt/isabelle
      - PYTHONPATH=/app
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"
    command: python -m uvicorn server.app.main:app --host 0.0.0.0 --port 8000

volumes:
  isabelle_user_data:                      