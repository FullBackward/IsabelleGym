services:
  isabelle-gym:
    # No platform pin: build/run natively for the host architecture. The old
    # `platform: linux/amd64` forced qemu-x86_64 emulation on Apple Silicon
    # (5-20x slower Isabelle; session creation took many minutes). The
    # Dockerfile selects the matching Isabelle tarball (x86-64 vs ARM) itself.
    build:
      context: .
    container_name: isabelle-gym
    volumes:
      - .:/app
      - isabelle_user_data:/root/.isabelle
    env_file:
      - .env
    # `environment` entries override .env on conflict
    environment:
      - ISABELLE_HOME=/opt/isabelle
      - PYTHONPATH=/app
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"
    # Real cgroup ceiling so the memory admission gate bites at a known limit
    # and cAdvisor can report OOM events. Raise for bigger concurrent sweeps.
    mem_limit: 24g
    command: bash

  prometheus:
    image: prom/prometheus:latest
    container_name: isabelle-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: isabelle-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: isabelle-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  isabelle_user_data:
  prometheus_data:
  grafana_data: