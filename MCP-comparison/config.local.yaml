# Local overrides for the MCP comparison harness.
# This file is not tracked by git; edit it for your machine.

model:
  # DeepSeek API
  base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  model_id: deepseek-v4-pro
  temperature: 0.3
  # 4096 caused the empty-response runs: DeepSeek's hidden reasoning consumed the
  # whole budget (finish_reason=length) before any visible output/tool call.
  max_tokens: 32768

budgets:
  max_rounds: 50
  problem_wall_cap_seconds: 1200     # 20 min per problem
  tool_timeout_seconds: 300         # 5 min per MCP tool call
  repeats: 2

# --- Universal system prompt ---
# Override this to change the system prompt, or set to "" to disable.
# The prompt is injected before the first user message for ALL three MCPs.
system_prompt: |
  You are an expert in Isabelle/HOL theorem proving with access to MCP tools.





mcp_servers:
  isabellegym:
    command: [python, -m, mcp_server.app]
    env:
      PYTHONPATH: /Users/winstonren/GitHub/IsabelleGym
      ISABELLE_MCP_GYM_URL: http://localhost:8000

  isabelle_mcp:
    # Container mode: spawns isabelle-mcp inside the running Docker container.
    command: [docker, exec, -i, isabelle-eval, isabelle-mcp]
    env: {}

  autocorrode_iq:
    # Stdio bridge to the I/Q TCP server inside jEdit.
    command: [python, /Users/winstonren/GitHub/AutoCorrode/iq/iq_bridge.py]
    env:
      IQ_MCP_BRIDGE_PORT: "8765"

# Path translation for Isabelle-MCP container mode.
# The harness writes .thy files to host_work_dir on the host and translates
# paths to container_work_dir before calling MCP tools.
isabelle_mcp_container:
  container_name: isabelle-eval
  host_work_dir: /Users/winstonren/GitHub/Isabelle-MCP/container/work
  container_work_dir: /work

arbiter:
  gym_url: http://localhost:8000
