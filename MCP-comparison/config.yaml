# MCP comparison harness configuration
# Copy this to config.local.yaml and override values, or set env vars.

model:
  provider: deepseek                 # "deepseek", "kimi", or any OpenAI-compatible
  base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  model_id: deepseek-v4-pro
  temperature: 0.0                   # DeepSeek supports 0–2; use 0 for deterministic
  max_tokens: 4096

budgets:
  max_rounds: 40
  problem_wall_cap_seconds: 900     # 15 min per problem
  tool_timeout_seconds: 300         # 5 min per MCP tool call
  repeats: 3

paths:
  problems_dir: MCP-comparison/problems
  runs_dir: MCP-comparison/runs

# --- Universal system prompt (applied to ALL three MCPs) ---
# Leave commented-out or empty to disable.  Use one of the suggested prompts
# below, or write your own.  The prompt is injected as a single system message
# before the first user message.
system_prompt: |
  You are an expert interactive theorem prover assistant for Isabelle/HOL.

  Your job is to construct a complete, correct Isar proof of the target theorem,
  using the tools provided by the Isabelle MCP server you are connected to.

  GUIDELINES
  ----------
  1. ASK before you assume.  If you don't know a lemma name or a type, use the
     diagnostic/lookup tools (thm, find_theorems, term, typ, get_diagnostics,
     etc.) instead of guessing.

  2. WRITE COMPLETE proof blocks.  Every `theorem` / `lemma` must be paired
     with `proof ... qed` or a terminal method (e.g. `by auto`).  Open proofs
     and `sorry` / `oops` mean failure.

  3. VERIFY after every edit.  After writing a proof chunk, run the
     verify/check tool to see which lines succeeded or failed.  Fix red lines
     before moving on.

  4. USE AUTOMATION WISELY.  For a stuck goal, try sledgehammer or a
     higher-level tactic (auto, blast, metis, linarith, presburger) before
     writing a long manual proof.

  5. STOP when the theorem is proved.  When the verification tool reports
     success and the proof is closed (no open subgoals, no sorry), you are
     done.  Reply with "DONE" and nothing else.

# Per-system command/transport settings
mcp_servers:
  isabellegym:
    command: [python, -m, mcp_server.app]
    env:
      PYTHONPATH: .
      ISABELLE_MCP_GYM_URL: http://localhost:8000

  isabelle_mcp:
    # Two ways to run:
    # (a) Native: patched Isabelle + isabelle-mcp on host PATH
    #     command: [isabelle-mcp]
    # (b) Container: server lives inside a running Docker container
    #     command: [docker, exec, -i, isabelle-eval, isabelle-mcp]
    command: [isabelle-mcp]
    env: {}

  autocorrode_iq:
    # Stdio bridge to the I/Q TCP server inside jEdit.
    command: [python, /path/to/AutoCorrode/iq/iq_bridge.py]
    env:
      IQ_MCP_BRIDGE_PORT: "8765"

# Container-mode path translation for Isabelle-MCP.
# Set container_name if the MCP server runs inside Docker; leave null for native mode.
# The harness writes .thy files to host_work_dir and translates paths to container_work_dir
# before calling MCP tools.
isabelle_mcp_container:
  container_name: null           # e.g. isabelle-eval
  host_work_dir: null            # absolute host path, e.g. C:/Users/winst/GitHub/Isabelle-MCP/container/work
  container_work_dir: /work

arbiter:
  isabelle_bin: isabelle
  # If true, delete the throwaway session after checking.
  cleanup: true